[package]
name = "oppai-zero-train"
version = "0.1.0"
authors = ["Evgeny Kurnevsky <kurnevsky@gmail.com>"]
license = "AGPL-3.0+"
description = "Open Points Artificial Intelligence"
edition = "2024"

[dependencies]
ndarray.workspace = true
num-traits.workspace = true
either.workspace = true
burn = { workspace = true, features = ["autodiff", "autotune", "fusion"] }
rand.workspace = true
rand_distr.workspace = true
log.workspace = true
env_logger.workspace = true
clap = { workspace = true, features = [ "cargo" ] }
anyhow.workspace = true
sgf-parse.workspace = true
strum.workspace = true
ctrlc = "3.5"
oppai-field = { path = "../field" }
oppai-sgf = { path = "../sgf" }
oppai-zero = { path = "../zero" }
oppai-zero-burn = { path = "../zero-burn" }
oppai-zero-sgf = { path = "../zero-sgf" }

[dev-dependencies]
rand_xoshiro.workspace = true

[features]
default = ["dsu", "ndarray", "vulkan"]
dsu = ["oppai-field/dsu"]
cuda = ["burn/cuda"]
rocm = ["burn/rocm"]
flex = ["burn/flex"]
ndarray = ["burn/ndarray"]
vulkan = ["burn/vulkan"]
webgpu = ["burn/webgpu"]
